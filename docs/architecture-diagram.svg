<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="850" viewBox="0 0 1500 850">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f6fc"/><stop offset="1" stop-color="#efeafd"/>
    </linearGradient>
    <linearGradient id="azure" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0078d4"/><stop offset="1" stop-color="#5b43d6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#35255b" flood-opacity="0.16"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#665a75"/></marker>
    <style>
      .title{font:700 34px Arial,sans-serif;fill:#211a2b}.sub{font:400 18px Arial,sans-serif;fill:#6f6878}.box{filter:url(#shadow)}
      .boxTitle{font:700 23px Arial,sans-serif;fill:#fff}.boxText{font:400 17px Arial,sans-serif;fill:#fff}.darkTitle{font:700 23px Arial,sans-serif;fill:#211a2b}.darkText{font:400 17px Arial,sans-serif;fill:#655d6d}
      .label{font:700 15px Arial,sans-serif;fill:#665a75}.small{font:400 15px Arial,sans-serif;fill:#6f6878}
    </style>
  </defs>
  <rect width="1500" height="850" rx="34" fill="url(#bg)"/>
  <text x="70" y="70" class="title">Diet Analysis Phase 2 - Cloud Architecture</text>
  <text x="70" y="105" class="sub">Live dashboard integration using Azure Static Web Apps, Azure Functions, and Azure Blob Storage</text>

  <rect class="box" x="70" y="260" width="260" height="190" rx="22" fill="#24183b"/>
  <text x="200" y="315" text-anchor="middle" class="boxTitle">User Browser</text>
  <text x="200" y="352" text-anchor="middle" class="boxText">Filters and refresh</text>
  <text x="200" y="382" text-anchor="middle" class="boxText">Four visualizations</text>
  <text x="200" y="412" text-anchor="middle" class="boxText">Execution metadata</text>

  <rect class="box" x="440" y="210" width="300" height="290" rx="22" fill="url(#azure)"/>
  <text x="590" y="270" text-anchor="middle" class="boxTitle">Azure Static Web Apps</text>
  <text x="590" y="310" text-anchor="middle" class="boxText">Hosts frontend/index.html</text>
  <text x="590" y="342" text-anchor="middle" class="boxText">Public HTTPS URL</text>
  <text x="590" y="374" text-anchor="middle" class="boxText">GitHub Actions deployment</text>
  <rect x="485" y="410" width="210" height="54" rx="12" fill="rgba(255,255,255,.18)" stroke="rgba(255,255,255,.35)"/>
  <text x="590" y="443" text-anchor="middle" class="boxText">HTML + CSS + JavaScript</text>

  <rect class="box" x="855" y="155" width="330" height="405" rx="22" fill="#ffffff" stroke="#dcd4e7" stroke-width="2"/>
  <text x="1020" y="215" text-anchor="middle" class="darkTitle">Azure Function App</text>
  <text x="1020" y="246" text-anchor="middle" class="darkText">Python + Pandas serverless API</text>
  <rect x="905" y="285" width="230" height="58" rx="13" fill="#f0ecff"/>
  <text x="1020" y="320" text-anchor="middle" class="darkText">GetNutritionalInsights</text>
  <rect x="905" y="365" width="230" height="58" rx="13" fill="#eef8ff"/>
  <text x="1020" y="400" text-anchor="middle" class="darkText">GetRecipes</text>
  <rect x="905" y="445" width="230" height="58" rx="13" fill="#effbf6"/>
  <text x="1020" y="480" text-anchor="middle" class="darkText">GetClusters</text>
  <text x="1020" y="535" text-anchor="middle" class="small">Anonymous HTTP triggers + CORS</text>

  <rect class="box" x="1270" y="260" width="190" height="190" rx="22" fill="#168b62"/>
  <text x="1365" y="315" text-anchor="middle" class="boxTitle">Azure Blob</text>
  <text x="1365" y="346" text-anchor="middle" class="boxTitle">Storage</text>
  <text x="1365" y="388" text-anchor="middle" class="boxText">datasets container</text>
  <text x="1365" y="418" text-anchor="middle" class="boxText">All_Diets.csv</text>

  <path d="M330 355 C375 355 395 355 440 355" fill="none" stroke="#665a75" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="385" y="338" text-anchor="middle" class="label">HTTPS</text>
  <path d="M740 355 C785 355 810 355 855 355" fill="none" stroke="#665a75" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="798" y="332" text-anchor="middle" class="label">fetch JSON</text>
  <path d="M1185 355 C1210 355 1235 355 1270 355" fill="none" stroke="#665a75" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="1228" y="332" text-anchor="middle" class="label">Blob SDK</text>
  <path d="M1270 398 C1235 470 1210 500 1185 500" fill="none" stroke="#665a75" stroke-width="3" marker-end="url(#arrow)" stroke-dasharray="8 7"/>
  <text x="1245" y="495" text-anchor="middle" class="label">CSV bytes</text>
  <path d="M855 500 C820 555 785 585 740 585" fill="none" stroke="#665a75" stroke-width="3" marker-end="url(#arrow)" stroke-dasharray="8 7"/>
  <text x="795" y="582" text-anchor="middle" class="label">JSON response</text>

  <rect x="350" y="650" width="800" height="120" rx="20" fill="#ffffff" stroke="#dcd4e7" stroke-width="2"/>
  <text x="750" y="690" text-anchor="middle" class="darkTitle">End-to-end workflow</text>
  <text x="750" y="726" text-anchor="middle" class="darkText">User action → frontend fetch → Function reads live blob → Pandas analysis → JSON → SVG charts and table</text>
  <text x="750" y="754" text-anchor="middle" class="small">GitHub main branch is the source of truth for frontend, backend, workflow, and documentation.</text>
</svg>
